# Render Blueprint — Static site for the frontend only
# Bot + API run on WispByte, not Render
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: modbot-dashboard
    runtime: static
    buildCommand: cd website && npm ci && npm run build
    staticPublishPath: ./website/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
