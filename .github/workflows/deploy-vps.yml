name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.VPS_DEPLOY_ENABLED == 'true' || secrets.VPS_HOST != '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy latest commit
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          MODBOT_APP_DIR: ${{ vars.MODBOT_APP_DIR }}
          MODBOT_BRANCH: main
          MODBOT_SERVICE: ${{ vars.MODBOT_SERVICE }}
        run: |
          : "${VPS_HOST:?Missing VPS_HOST secret}"
          : "${VPS_USER:=root}"
          : "${VPS_PORT:=22}"
          : "${MODBOT_APP_DIR:=/opt/modbot}"
          : "${MODBOT_SERVICE:=modbot}"
          ssh -p "${VPS_PORT}" "${VPS_USER}@${VPS_HOST}" \
            "MODBOT_APP_DIR='${MODBOT_APP_DIR}' MODBOT_BRANCH='${MODBOT_BRANCH}' MODBOT_SERVICE='${MODBOT_SERVICE}' '${MODBOT_APP_DIR}/scripts/vps_deploy.sh'"
